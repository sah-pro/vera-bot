services:
  - type: web
    name: vera-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # you will paste this in Render dashboard
      - key: TEAM_NAME
        sync: false
      - key: TEAM_EMAIL
        sync: false
      - key: TEAM_MEMBERS
        sync: false
    healthCheckPath: /v1/healthz
    autoDeploy: true
